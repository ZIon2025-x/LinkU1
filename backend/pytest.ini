[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    -x
    --color=yes

markers =
    unit: Unit tests (no network required)
    api: API integration tests (requires test environment)
    auth: Authentication related tests
    task: Task related tests
    payment: Payment related tests
    slow: Slow tests (can be skipped)
    asyncio: Async tests (requires pytest-asyncio)

asyncio_mode = auto

timeout = 60

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
