<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linker · 聊天界面设计稿</title>
<style>
  :root {
    --primary: #007AFF;
    --primary-light: #409CFF;
    --primary-dark: #0059B3;
    --purple: #7359F2;
    --teal: #5AC8FA;
    --pink: #FF4D80;
    --success: #26BF73;
    --warning: #FFA600;

    --gradient-linker: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
    --gradient-primary: linear-gradient(135deg, #007AFF 0%, #409CFF 100%);
    --gradient-cs: linear-gradient(135deg, #FF8033 0%, #FF4D80 100%);

    --bg: #f5f5f7;
    --card: #ffffff;
    --text-1: #1c1c1e;
    --text-2: #6e6e73;
    --text-3: #a1a1a6;
    --divider: #e5e5ea;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.10);
    --shadow-bubble: 0 1px 1px rgba(28,28,30,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background:
      radial-gradient(ellipse at 20% 0%, #dbeafe 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, #fce7f3 0%, transparent 50%),
      linear-gradient(180deg, #fefefe 0%, #f8fafc 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    color: var(--text-1);
    -webkit-font-smoothing: antialiased;
  }

  /* ============= phone frame ============= */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--card);
    border-radius: 48px;
    overflow: hidden;
    box-shadow:
      0 0 0 12px #1d1d1f,
      0 0 0 13px #2c2c2e,
      0 30px 80px rgba(0,0,0,0.18),
      0 12px 40px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 124px;
    height: 36px;
    background: #1d1d1f;
    border-radius: 20px;
    z-index: 30;
  }
  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    border-radius: 3px;
    background: rgba(0,0,0,0.85);
    z-index: 30;
  }

  /* ============= status bar ============= */
  .status-bar {
    height: 47px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-1);
    flex-shrink: 0;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .status-bar .right { display: flex; gap: 5px; align-items: center; }

  /* ============= app bar ============= */
  .appbar {
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--divider);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .iconbtn {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--text-1);
    border: none;
    background: transparent;
    transition: background 0.15s;
  }
  .iconbtn:hover { background: var(--bg); }
  .title-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .app-title {
    font-size: 17px;
    font-weight: 700;
    background: var(--gradient-linker);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.5px;
  }
  .app-subtitle {
    font-size: 11px;
    color: var(--text-3);
    display: flex; align-items: center; gap: 5px;
  }
  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 0 rgba(38,191,115,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(38,191,115,0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(38,191,115,0);    }
    100% { box-shadow: 0 0 0 0   rgba(38,191,115,0);    }
  }

  /* ============= messages area ============= */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      linear-gradient(180deg, rgba(245,245,247,0) 0%, rgba(245,245,247,0.5) 30%, rgba(245,245,247,0.8) 100%);
  }
  .messages::-webkit-scrollbar { width: 0; }

  /* ============= welcome ============= */
  .welcome {
    text-align: center;
    margin: 8px auto 4px;
    animation: fadeUp 0.4s ease-out;
  }
  .linker-avatar {
    width: 76px; height: 76px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: var(--gradient-linker);
    display: grid; place-items: center;
    box-shadow:
      0 8px 24px rgba(115,89,242,0.28),
      inset 0 -3px 8px rgba(0,0,0,0.08),
      inset 0 2px 8px rgba(255,255,255,0.25);
    position: relative;
  }
  .linker-avatar::before {
    content: "";
    position: absolute; inset: -8px;
    border-radius: 50%;
    background: var(--gradient-linker);
    opacity: 0.18;
    filter: blur(14px);
    z-index: -1;
  }
  .welcome h1 {
    font-size: 22px;
    font-weight: 700;
    background: var(--gradient-linker);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .welcome p {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.55;
    margin: 0 28px;
  }
  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 4px 0;
  }
  .suggest-card {
    padding: 12px;
    background: var(--card);
    border: 0.5px solid var(--divider);
    border-radius: 14px;
    text-align: left;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .suggest-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: rgba(0,122,255,0.3);
  }
  .suggest-card .ico {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: grid; place-items: center;
    margin-bottom: 8px;
    color: white;
  }
  .suggest-card .label {
    font-size: 12px;
    color: var(--text-1);
    font-weight: 500;
    line-height: 1.35;
  }
  .ico.blue   { background: linear-gradient(135deg, #007AFF, #5AC8FA); }
  .ico.purple { background: linear-gradient(135deg, #7359F2, #FF4D80); }
  .ico.orange { background: linear-gradient(135deg, #FF8033, #FFD700); }
  .ico.green  { background: linear-gradient(135deg, #26BF73, #5AC8FA); }

  /* ============= bubbles ============= */
  .row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.3s ease-out;
  }
  .row.user { justify-content: flex-end; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ai-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--gradient-linker);
    display: grid; place-items: center;
    flex-shrink: 0;
    margin-bottom: 2px;
    box-shadow: 0 2px 8px rgba(115,89,242,0.25);
  }
  .ai-avatar.cs { background: var(--gradient-cs); box-shadow: 0 2px 8px rgba(255,128,51,0.3); }

  .bubble {
    max-width: 76%;
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 14.5px;
    line-height: 1.5;
    word-wrap: break-word;
    position: relative;
  }
  .bubble.ai {
    background: var(--card);
    color: var(--text-1);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-bubble);
    border: 0.5px solid var(--divider);
  }
  .bubble.user {
    background: var(--gradient-primary);
    color: white;
    border-bottom-right-radius: 6px;
    box-shadow: 0 2px 10px rgba(0,122,255,0.22);
  }
  .bubble.cs {
    background: linear-gradient(135deg, #fff7e6 0%, #fff1d6 100%);
    color: #6b4500;
    border: 0.5px solid #ffd9a8;
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-bubble);
  }
  .bubble strong { font-weight: 600; }

  .meta-time {
    font-size: 10.5px;
    color: var(--text-3);
    margin: 2px 38px;
  }
  .row.user + .meta-time { text-align: right; margin-right: 4px; }

  /* ============= tool call card ============= */
  .tool-card {
    background: var(--card);
    border: 0.5px solid var(--divider);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-2);
    max-width: 76%;
    box-shadow: var(--shadow-bubble);
    margin-left: 38px;
    animation: fadeUp 0.3s ease-out;
  }
  .tool-card .spinner {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--divider);
    border-top-color: var(--primary);
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-card.done { color: var(--success); border-color: rgba(38,191,115,0.25); background: rgba(38,191,115,0.06); }
  .tool-card.done .spinner {
    border: none;
    background: var(--success);
    animation: none;
    display: grid; place-items: center;
  }
  .tool-card.done .spinner::after {
    content: "";
    width: 4px; height: 7px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  /* ============= streaming dots ============= */
  .bubble.streaming {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    align-items: center;
  }
  .bubble.streaming .dot {
    width: 7px; height: 7px;
    background: var(--text-3);
    border-radius: 50%;
    animation: bounce 1.4s ease-in-out infinite;
  }
  .bubble.streaming .dot:nth-child(2) { animation-delay: 0.16s; }
  .bubble.streaming .dot:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-5px); opacity: 1; }
  }

  /* ============= task draft card ============= */
  .draft-card {
    background: var(--card);
    border-radius: 18px;
    padding: 14px 14px 12px;
    max-width: 84%;
    margin-left: 38px;
    box-shadow:
      0 1px 1px rgba(28,28,30,0.04),
      0 8px 24px rgba(115,89,242,0.08);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease-out;
    border: 0.5px solid rgba(115,89,242,0.15);
  }
  .draft-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--gradient-linker);
  }
  .draft-card .draft-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.6px;
    color: var(--purple);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .draft-card .draft-title {
    font-size: 15.5px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 10px;
    line-height: 1.35;
  }
  .draft-card .meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .draft-card .chip {
    font-size: 11.5px;
    padding: 4px 9px;
    border-radius: 8px;
    background: var(--bg);
    color: var(--text-2);
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
  }
  .draft-card .actions { display: flex; gap: 8px; }
  .draft-card .btn {
    flex: 1;
    padding: 9px;
    border-radius: 11px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .draft-card .btn:active { transform: scale(0.98); }
  .draft-card .btn:hover  { opacity: 0.9; }
  .draft-card .btn.primary {
    background: var(--gradient-linker);
    color: white;
    box-shadow: 0 4px 12px rgba(115,89,242,0.28);
  }
  .draft-card .btn.secondary {
    background: var(--bg);
    color: var(--text-1);
  }

  /* ============= divider (handoff) ============= */
  .handoff-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 8px;
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
  }
  .handoff-divider::before,
  .handoff-divider::after {
    content: "";
    flex: 1; height: 0.5px;
    background: linear-gradient(90deg, transparent, var(--divider), transparent);
  }
  .handoff-divider .handoff-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,128,51,0.10), rgba(255,77,128,0.10));
    color: #b35628;
    border: 0.5px solid rgba(255,128,51,0.25);
  }

  /* ============= quick actions row ============= */
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 10px 14px 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .quick-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 18px;
    background: var(--card);
    border: 0.5px solid var(--divider);
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px;
    color: var(--text-1);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, color 0.15s;
    font-weight: 500;
    font-family: inherit;
  }
  .quick-chip:hover {
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-1px);
  }
  .quick-chip.featured {
    background: var(--gradient-linker);
    border: none;
    color: white;
    box-shadow: 0 4px 14px rgba(115,89,242,0.35);
  }
  .quick-chip.featured:hover { color: white; }

  /* ============= input bar ============= */
  .input-bar {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--divider);
    padding: 8px 12px 24px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: var(--bg);
    border-radius: 22px;
    padding: 0 4px 0 16px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: box-shadow 0.2s, background 0.2s;
  }
  .input-wrap:focus-within {
    background: var(--card);
    box-shadow: 0 0 0 2px rgba(0,122,255,0.18);
  }
  .input-field {
    flex: 1;
    padding: 11px 0;
    font-size: 15px;
    color: var(--text-1);
    border: none;
    outline: none;
    background: transparent;
    resize: none;
    font-family: inherit;
    max-height: 100px;
    line-height: 1.45;
  }
  .input-field::placeholder { color: var(--text-3); }
  .input-tool {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--text-2);
    cursor: pointer;
    border: none; background: transparent;
    transition: color 0.15s;
  }
  .input-tool:hover { color: var(--primary); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--gradient-primary);
    display: grid; place-items: center;
    color: white;
    cursor: pointer;
    border: none;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(0,122,255,0.35);
    transition: transform 0.15s;
  }
  .send-btn:hover  { transform: scale(1.06); }
  .send-btn:active { transform: scale(0.94); }

  /* ============= description card next to phone ============= */
  .legend {
    display: none;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>

    <!-- Status bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span class="right">
        <!-- signal -->
        <svg width="18" height="11" viewBox="0 0 18 11" fill="currentColor"><rect x="0"  y="7" width="3" height="4" rx="0.6"/><rect x="5"  y="5" width="3" height="6" rx="0.6"/><rect x="10" y="3" width="3" height="8" rx="0.6"/><rect x="15" y="0" width="3" height="11" rx="0.6"/></svg>
        <!-- wifi -->
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 11l2.5-2.5a3.54 3.54 0 0 0-5 0L8 11zm0-3.6a4.55 4.55 0 0 1 6.43 0l1.07-1.06a6.06 6.06 0 0 0-9 0L8 7.4zM8 4a7.57 7.57 0 0 1 5.39 2.23l1.07-1.06a9.07 9.07 0 0 0-12.92 0l1.07 1.06A7.57 7.57 0 0 1 8 4z"/></svg>
        <!-- battery -->
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="19" height="8" rx="1.6" fill="currentColor"/><rect x="23.5" y="3.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity="0.4"/></svg>
      </span>
    </div>

    <!-- App bar -->
    <header class="appbar">
      <button class="iconbtn" aria-label="back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="title-wrap">
        <div class="app-title">Linker</div>
        <div class="app-subtitle"><span class="pulse"></span>智能助手 · 人工客服在线</div>
      </div>
      <button class="iconbtn" aria-label="history">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="iconbtn" aria-label="new">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
    </header>

    <!-- Messages -->
    <main class="messages">

      <!-- Welcome / suggestion grid -->
      <section class="welcome">
        <div class="linker-avatar">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
            <defs>
              <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
                <stop offset="100%" stop-color="#fff" stop-opacity="0.7"/>
              </linearGradient>
            </defs>
            <path d="M12 2l1.7 5.4L19 9.1l-5.3 1.7L12 16l-1.7-5.2L5 9.1l5.3-1.7L12 2z" fill="url(#sparkle)"/>
            <path d="M19 14l0.9 2.6L22.5 17.5l-2.6 0.9L19 21l-0.9-2.6L15.5 17.5l2.6-0.9L19 14z" fill="white" opacity="0.9"/>
          </svg>
        </div>
        <h1>你好，我是 Linker</h1>
        <p>你的 AI 任务助手，可以帮你发任务、找服务、查订单、连客服</p>

        <div class="suggestions">
          <button class="suggest-card">
            <div class="ico blue">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="label">帮我发布一个搬家任务</div>
          </button>
          <button class="suggest-card">
            <div class="ico purple">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <div class="label">推荐附近的家政达人</div>
          </button>
          <button class="suggest-card">
            <div class="ico orange">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div class="label">查询我的订单状态</div>
          </button>
          <button class="suggest-card">
            <div class="ico green">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="label">联系人工客服</div>
          </button>
        </div>
      </section>

      <!-- User message -->
      <div class="row user">
        <div class="bubble user">帮我发个明天下午搬家的任务，2 人，预算 200 块</div>
      </div>

      <!-- Tool call (in progress) -->
      <div class="tool-card">
        <div class="spinner"></div>
        <span>正在为你创建任务草稿…</span>
      </div>

      <!-- Tool call (done) -->
      <div class="tool-card done">
        <div class="spinner"></div>
        <span>已生成草稿</span>
      </div>

      <!-- AI response -->
      <div class="row ai">
        <div class="ai-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2l1.7 5.4L19 9.1l-5.3 1.7L12 16l-1.7-5.2L5 9.1l5.3-1.7L12 2z"/></svg>
        </div>
        <div class="bubble ai">已经帮你准备好了，请确认下方任务卡片 👇</div>
      </div>

      <!-- Task draft card -->
      <div class="draft-card">
        <div class="draft-label">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.7 5.4L19 9.1l-5.3 1.7L12 16l-1.7-5.2L5 9.1l5.3-1.7L12 2z"/></svg>
          任务草稿
        </div>
        <div class="draft-title">明天下午搬家协助 · 上海·静安</div>
        <div class="meta">
          <span class="chip">🏠 搬家</span>
          <span class="chip">👥 2 人</span>
          <span class="chip">💰 ¥200</span>
          <span class="chip">⏰ 明天 14:00</span>
        </div>
        <div class="actions">
          <button class="btn secondary">修改</button>
          <button class="btn primary">确认发布</button>
        </div>
      </div>

      <!-- User follow-up -->
      <div class="row user">
        <div class="bubble user">想找个人工客服问下退款</div>
      </div>

      <!-- Handoff divider -->
      <div class="handoff-divider">
        <span class="handoff-pill">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1v-6h3v4zM3 19a2 2 0 0 0 2 2h1v-6H3v4z"/></svg>
          已为你接通人工客服
        </span>
      </div>

      <!-- CS message -->
      <div class="row ai">
        <div class="ai-avatar cs">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1v-6h3v4zM3 19a2 2 0 0 0 2 2h1v-6H3v4z"/></svg>
        </div>
        <div class="bubble cs">您好，我是客服 <strong>小林</strong>，很高兴为您服务～请问需要查询哪一笔订单的退款？</div>
      </div>

      <!-- Streaming bubble (CS thinking, or AI thinking) -->
      <div class="row ai">
        <div class="ai-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2l1.7 5.4L19 9.1l-5.3 1.7L12 16l-1.7-5.2L5 9.1l5.3-1.7L12 2z"/></svg>
        </div>
        <div class="bubble streaming">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

    </main>

    <!-- Quick actions -->
    <div class="quick-actions">
      <button class="quick-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        历史记录
      </button>
      <button class="quick-chip featured">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1v-6h3v4zM3 19a2 2 0 0 0 2 2h1v-6H3v4z"/></svg>
        连接人工
      </button>
      <button class="quick-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新对话
      </button>
      <button class="quick-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        发任务
      </button>
    </div>

    <!-- Input -->
    <footer class="input-bar">
      <div class="input-wrap">
        <textarea class="input-field" rows="1" placeholder="给 Linker 发消息…"></textarea>
        <button class="input-tool" aria-label="image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
      </div>
      <button class="send-btn" aria-label="send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </footer>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
