name: Main CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 后端验证
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install system deps for pycairo
      run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    
    - name: Validate imports
      run: |
        echo "🔍 Validating Python imports..."
        # 设置 PYTHONPATH 确保可以导入 app 模块
        export PYTHONPATH="${PYTHONPATH}:$(pwd)"
        python -c "import app.main; print('✅ Main module imports successfully')" || exit 1
        python -c "from app.config import Config; print('✅ Config module imports successfully')" || exit 1
        python -c "import app.routers; print('✅ Router module imports successfully')" || exit 1
    
    - name: Check syntax
      run: |
        echo "🔍 Checking Python syntax..."
        python -m compileall app/ || exit 1
        echo "✅ All Python files have valid syntax"

    - name: Run tests
      env:
        TEST_API_URL: ${{ secrets.TEST_API_URL }}
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      run: |
        echo "🔍 Running pytest..."
        export PYTHONPATH="${PYTHONPATH}:$(pwd)"
        
        # 清理 Stripe 密钥中可能的空格和换行符
        if [ -n "$STRIPE_TEST_SECRET_KEY" ]; then
          export STRIPE_TEST_SECRET_KEY=$(echo "$STRIPE_TEST_SECRET_KEY" | tr -d '[:space:]')
          echo "🔑 Stripe 测试密钥已配置"
        fi
        
        # 如果 TEST_API_URL 已配置，运行所有测试；否则只运行单元测试（跳过 API 测试）
        if [ -n "$TEST_API_URL" ]; then
          echo "📡 TEST_API_URL 已配置，运行所有测试..."
          python -m pytest tests/ -v --tb=short -x
        else
          echo "⚠️ TEST_API_URL 未配置，跳过 API 集成测试..."
          # 只运行非 API 测试（排除 tests/api/ 目录）
          python -m pytest tests/ -v --tb=short -x --ignore=tests/api/
        fi
        echo "✅ Tests passed"

  # 前端验证
  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2  # 需要获取上一个提交来比较
    
    - name: Check if frontend changed
      id: check-frontend
      run: |
        if git diff HEAD^ HEAD --quiet -- frontend/; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "⏭️  No changes in frontend folder, skipping validation"
          exit 0
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ Frontend folder has changes, proceeding with validation"
        fi
    
    - name: Set up Node.js
      if: steps.check-frontend.outputs.changed == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      if: steps.check-frontend.outputs.changed == 'true'
      run: npm ci
    
    - name: TypeScript check
      if: steps.check-frontend.outputs.changed == 'true'
      run: |
        echo "🔍 Running TypeScript type checking..."
        npx tsc --noEmit
        echo "✅ TypeScript compilation successful"
    
    - name: Run tests
      if: steps.check-frontend.outputs.changed == 'true'
      run: |
        echo "🧪 Running frontend tests..."
        npm test -- --watchAll=false --coverage --passWithNoTests
        echo "✅ Frontend tests passed"
    
    - name: Build test
      if: steps.check-frontend.outputs.changed == 'true'
      run: |
        echo "🔍 Testing build process..."
        npm run build
        echo "✅ Frontend build successful"

  # 部署状态检查
  deployment-check:
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deployment status
      run: |
        echo "🚀 Deployment Status Check"
        echo "========================="
        echo ""
        echo "✅ Backend validation: ${{ needs.backend-validation.result }}"
        echo "✅ Frontend validation: ${{ needs.frontend-validation.result }}"
        echo ""
        echo "📋 Deployment URLs:"
        echo "- Backend: https://linku1-production.up.railway.app"
        echo "- Frontend: https://your-vercel-domain.vercel.app"
        echo ""
        echo "🎉 All validations passed! Ready for deployment."
