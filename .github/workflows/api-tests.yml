# API Integration Tests + Unit Tests
#
# Required GitHub Secrets:
#   - TEST_API_URL:          Railway test environment URL
#   - TEST_USER_EMAIL:       Test account email
#   - TEST_USER_PASSWORD:    Test account password
#   - STRIPE_TEST_SECRET_KEY (optional)
#   - TEST_ADMIN_USERNAME:   Admin test account (optional, for admin API tests)
#   - TEST_ADMIN_PASSWORD:   Admin test account password (optional)

name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category'
        required: false
        type: choice
        options: [all, unit, auth, task, payment, forum, admin]
        default: 'all'

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Unit Tests (no network required)
  # =========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'unit'

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python -m pytest \
            tests/test_bilingual_helper.py \
            tests/test_sql_splitter.py \
            tests/test_redis_utils.py \
            tests/test_content_filter.py \
            tests/test_security_hardening.py \
            tests/test_task_recommendation.py \
            -v --tb=short --color=yes \
            --junitxml=test-results-unit.xml \
            2>&1 | tee test_output_unit.txt
          exit ${PIPESTATUS[0]}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            backend/test_output_unit.txt
            backend/test-results-unit.xml
          retention-days: 7

  # =========================================================================
  # Pre-flight: validate TEST_API_URL is safe
  # =========================================================================
  pre-check:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'auth' || github.event.inputs.test_category == 'task' || github.event.inputs.test_category == 'payment' || github.event.inputs.test_category == 'forum' || github.event.inputs.test_category == 'admin'

    outputs:
      can_run: ${{ steps.validate.outputs.can_run }}
      test_url: ${{ steps.validate.outputs.test_url }}

    env:
      TEST_API_URL: ${{ secrets.TEST_API_URL }}

    steps:
      - name: Validate configuration
        id: validate
        run: |
          if [ -z "$TEST_API_URL" ]; then
            echo "can_run=false" >> $GITHUB_OUTPUT
            echo "⚠️ TEST_API_URL not configured - API tests will be skipped"
            exit 0
          fi

          PRODUCTION_URLS=("api.link2ur.com" "linku1-production" "www.link2ur.com" "link2ur.com")
          for prod_url in "${PRODUCTION_URLS[@]}"; do
            if [[ "$TEST_API_URL" == *"$prod_url"* ]]; then
              echo "❌ TEST_API_URL points to production: $prod_url"
              exit 1
            fi
          done

          echo "test_url=$TEST_API_URL" >> $GITHUB_OUTPUT
          echo "can_run=true" >> $GITHUB_OUTPUT
          echo "✅ Config valid: $TEST_API_URL"

      - name: Check environment availability
        if: steps.validate.outputs.can_run == 'true'
        run: |
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$TEST_API_URL/api/secure-auth/captcha-site-key" || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✅ Test environment online (HTTP $HTTP_CODE)"
              exit 0
            fi
            [ $i -lt 3 ] && sleep 5
          done
          echo "❌ Cannot reach test environment: $TEST_API_URL"
          exit 1

  # =========================================================================
  # Auth API Tests
  # =========================================================================
  test-auth:
    name: Auth API Tests
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.can_run == 'true' && (github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'auth')
    timeout-minutes: 10

    env:
      TEST_API_URL: ${{ secrets.TEST_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      PYTHONPATH: ${{ github.workspace }}/backend

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt
      - run: pip install -r requirements-test.txt

      - name: Run auth tests
        run: |
          python -m pytest tests/api/test_auth_api.py \
            -v --tb=short --color=yes --timeout=60 \
            --junitxml=test-results-auth.xml \
            2>&1 | tee test_output_auth.txt
          exit ${PIPESTATUS[0]}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-test-results
          path: backend/test_output_auth.txt
          retention-days: 7

  # =========================================================================
  # Task API Tests
  # =========================================================================
  test-task:
    name: Task API Tests
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.can_run == 'true' && (github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'task')
    timeout-minutes: 10

    env:
      TEST_API_URL: ${{ secrets.TEST_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      PYTHONPATH: ${{ github.workspace }}/backend

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt
      - run: pip install -r requirements-test.txt

      - name: Run task tests
        run: |
          python -m pytest tests/api/test_task_api.py \
            -v --tb=short --color=yes --timeout=60 \
            --junitxml=test-results-task.xml \
            2>&1 | tee test_output_task.txt
          exit ${PIPESTATUS[0]}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-test-results
          path: backend/test_output_task.txt
          retention-days: 7

  # =========================================================================
  # Payment API Tests
  # =========================================================================
  test-payment:
    name: Payment API Tests
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.can_run == 'true' && (github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'payment')
    timeout-minutes: 10

    env:
      TEST_API_URL: ${{ secrets.TEST_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      PYTHONPATH: ${{ github.workspace }}/backend

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Validate Stripe test key
        if: env.STRIPE_TEST_SECRET_KEY != ''
        run: |
          CLEANED=$(echo "$STRIPE_TEST_SECRET_KEY" | tr -d '[:space:]')
          if [[ "$CLEANED" != sk_test_* ]]; then
            echo "❌ STRIPE_TEST_SECRET_KEY is not a test key"
            exit 1
          fi
          echo "STRIPE_TEST_SECRET_KEY=$CLEANED" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt
      - run: pip install -r requirements-test.txt
        working-directory: ./backend

      - name: Run payment tests
        working-directory: ./backend
        run: |
          python -m pytest tests/api/test_payment_api.py \
            -v --tb=short --color=yes --timeout=60 \
            --junitxml=test-results-payment.xml \
            2>&1 | tee test_output_payment.txt
          exit ${PIPESTATUS[0]}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: payment-test-results
          path: backend/test_output_payment.txt
          retention-days: 7

  # =========================================================================
  # Forum + Community API Tests
  # =========================================================================
  test-forum:
    name: Forum & Community API Tests
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.can_run == 'true' && (github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'forum')
    timeout-minutes: 15

    env:
      TEST_API_URL: ${{ secrets.TEST_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      PYTHONPATH: ${{ github.workspace }}/backend

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt
      - run: pip install -r requirements-test.txt

      - name: Run forum & community tests
        run: |
          python -m pytest \
            tests/api/test_forum_api.py \
            tests/api/test_chat_api.py \
            tests/api/test_flea_market_api.py \
            tests/api/test_notification_api.py \
            tests/api/test_leaderboard_api.py \
            tests/api/test_badges_api.py \
            -v --tb=short --color=yes --timeout=60 \
            --junitxml=test-results-forum.xml \
            2>&1 | tee test_output_forum.txt
          exit ${PIPESTATUS[0]}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forum-test-results
          path: backend/test_output_forum.txt
          retention-days: 7

  # =========================================================================
  # User + Newbie Tasks API Tests
  # =========================================================================
  test-user:
    name: User & Onboarding API Tests
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.can_run == 'true' && (github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all')
    timeout-minutes: 10

    env:
      TEST_API_URL: ${{ secrets.TEST_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      PYTHONPATH: ${{ github.workspace }}/backend

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt
      - run: pip install -r requirements-test.txt

      - name: Run user & onboarding tests
        run: |
          python -m pytest \
            tests/api/test_user_skills_api.py \
            tests/api/test_coupon_points_api.py \
            tests/api/test_newbie_tasks_api.py \
            tests/api/test_official_tasks_api.py \
            -v --tb=short --color=yes --timeout=60 \
            --junitxml=test-results-user.xml \
            2>&1 | tee test_output_user.txt
          exit ${PIPESTATUS[0]}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: user-test-results
          path: backend/test_output_user.txt
          retention-days: 7

  # =========================================================================
  # Admin API Tests (requires admin credentials)
  # =========================================================================
  test-admin:
    name: Admin API Tests
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.can_run == 'true' && (github.event.inputs.test_category == '' || github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'admin')
    timeout-minutes: 10

    env:
      TEST_API_URL: ${{ secrets.TEST_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_ADMIN_USERNAME: ${{ secrets.TEST_ADMIN_USERNAME }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      PYTHONPATH: ${{ github.workspace }}/backend

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt
      - run: pip install -r requirements-test.txt

      - name: Run admin tests
        run: |
          python -m pytest \
            tests/api/test_admin_incentive_api.py \
            -v --tb=short --color=yes --timeout=60 \
            --junitxml=test-results-admin.xml \
            2>&1 | tee test_output_admin.txt
          exit ${PIPESTATUS[0]}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-test-results
          path: backend/test_output_admin.txt
          retention-days: 7

  # =========================================================================
  # Summary
  # =========================================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, pre-check, test-auth, test-task, test-payment, test-forum, test-user, test-admin]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🧪 Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          declare -A results=(
            ["Unit Tests"]="${{ needs.unit-tests.result }}"
            ["Auth API"]="${{ needs.test-auth.result }}"
            ["Task API"]="${{ needs.test-task.result }}"
            ["Payment API"]="${{ needs.test-payment.result }}"
            ["Forum & Community"]="${{ needs.test-forum.result }}"
            ["User & Onboarding"]="${{ needs.test-user.result }}"
            ["Admin API"]="${{ needs.test-admin.result }}"
          )

          for name in "Unit Tests" "Auth API" "Task API" "Payment API" "Forum & Community" "User & Onboarding" "Admin API"; do
            result="${results[$name]}"
            case "$result" in
              success)  icon="✅" ;;
              failure)  icon="❌" ;;
              skipped)  icon="⏭️" ;;
              *)        icon="⚠️" ;;
            esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test env:** \`${{ needs.pre-check.outputs.test_url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run at:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any critical test failed
        run: |
          UNIT="${{ needs.unit-tests.result }}"
          AUTH="${{ needs.test-auth.result }}"
          TASK="${{ needs.test-task.result }}"

          if [ "$UNIT" == "failure" ] || [ "$AUTH" == "failure" ] || [ "$TASK" == "failure" ]; then
            echo "❌ Critical tests failed"
            exit 1
          fi
          echo "✅ All critical tests passed"
